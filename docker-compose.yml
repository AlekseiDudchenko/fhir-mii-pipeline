services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir_mii
      SPRING_DATASOURCE_USERNAME: fhir
      SPRING_DATASOURCE_PASSWORD: fhir
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fhir_mii
      POSTGRES_USER: fhir
      POSTGRES_PASSWORD: fhir
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhir -d fhir_mii"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
