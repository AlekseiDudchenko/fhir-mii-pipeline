databases:
  - name: fhir-mii-db
    plan: free
    databaseName: fhir_mii
    user: fhir

services:
  - type: web
    name: fhir-mii-pipeline
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PGHOST
        fromDatabase:
          name: fhir-mii-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: fhir-mii-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: fhir-mii-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: fhir-mii-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: fhir-mii-db
          property: password
